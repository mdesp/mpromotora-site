name: Deploy M Promotora Site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t mdesp/mpromotora-site:latest .
          docker push mdesp/mpromotora-site:latest

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            docker pull mdesp/mpromotora-site:latest
            docker stack deploy --with-registry-auth -c /root/docker-compose-mpromotora.yml mpromotora
