version: "3.7"

services:
  mpromotora:
    image: mdesp/mpromotora-site:latest
    networks:
      - network_public
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.http.routers.mpromotora.rule=Host(`mpromotora.turboconversa.online`)
        - traefik.http.routers.mpromotora.entrypoints=websecure
        - traefik.http.routers.mpromotora.tls.certresolver=letsencryptresolver
        - traefik.http.routers.mpromotora.service=mpromotora
        - traefik.http.services.mpromotora.loadbalancer.server.port=80
        - traefik.http.services.mpromotora.loadbalancer.passhostheader=true
        - traefik.http.routers.mpromotora.middlewares=sslheader@docker

networks:
  network_public:
    external: true
    name: network_public
